
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3월 볼꾸 세션 신청 시스템 (Google Sheets)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
body { font-family: 'Noto Sans KR', sans-serif; background-color: #fdf9f3; margin: 0; padding: 0; }
.loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #ff82a9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="p-4 md:p-6">

<div class="max-w-2xl mx-auto">
<!-- 신청 폼 섹션 -->
<div id="section-form" class="bg-white rounded-3xl shadow-xl overflow-hidden">
<div class="bg-pink-400 p-6 md:p-10 text-white relative">
<h1 class="text-2xl md:text-3xl font-bold">🖊️ 3월 볼꾸 세션 신청</h1>
<p class="mt-2 opacity-90 text-sm md:text-base">신청 즉시 구글 스프레드시트로 저장됩니다.</p>
</div>
<form id="regForm" class="p-6 md:p-8 space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-bold mb-2">이름</label>
<input type="text" name="name" id="name" required class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400" placeholder="성함을 입력하세요">
</div>
<div>
<label class="block text-sm font-bold mb-2">팀</label>
<input type="text" name="team" id="team" required class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400" placeholder="소속 팀을 입력하세요">
</div>
</div>

<div>
<label class="block text-sm font-bold mb-2">사내 이메일 주소</label>
<div class="relative flex items-center">
<input type="text" name="emailId" id="emailId" required
class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400 pr-32"
placeholder="이메일 아이디">
<span class="absolute right-4 text-gray-400 font-medium text-sm md:text-base">@coupang.com</span>
</div>
</div>
<div class="bg-pink-50 p-4 md:p-6 rounded-2xl border border-pink-100">
<label class="block text-sm font-bold mb-3 text-pink-800">
⚠️ 선착순 신청 안내
</label>
<p class="text-xs text-pink-600 mb-3">신청하시면 명단이 실시간으로 관리자 구글 시트에 기록됩니다.</p>
<select name="agreement" id="agreement" required class="w-full p-3 bg-white border border-pink-200 rounded-xl outline-pink-400 text-sm">
<option value="" disabled selected>내용을 확인했습니다</option>
<option value="확인완료">네, 이해했습니다</option>
</select>
</div>

<button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl hover:bg-pink-600 shadow-lg transition-all flex justify-center items-center">
<span>신청서 제출</span>
</button>
</form>

<!-- 성공 메시지 -->
<div id="success-msg" class="hidden p-10 text-center space-y-4">
<div class="text-6xl">🎉</div>
<h2 class="text-2xl font-bold text-gray-800">신청이 완료되었습니다!</h2>
<p class="text-gray-500">작성하신 정보가 안전하게 전달되었습니다.</p>
<button onclick="location.reload()" class="text-pink-500 underline mt-4">다시 작성하기</button>
</div>
</div>
</div>

<script>
// 1. 구글 앱스 스크립트 배포 후 받은 URL을 여기에 넣으세요.
const scriptURL = 'https://script.google.com/macros/s/AKfycbwfSQc5ME0OxMsvc8qvFwRtK9N7PsaA-eRq_Vz5tSSCHWf3sqDHAVpPy3OKm5JzlFrIZQ/exec';
const form = document.getElementById('regForm');
const submitBtn = document.getElementById('submit-btn');
const successMsg = document.getElementById('success-msg');

form.addEventListener('submit', e => {
e.preventDefault();
// 앱스 스크립트 URL이 설정되지 않았을 경우 안내
if (scriptURL === 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL') {
alert("구글 스크립트 URL 설정이 필요합니다. 안내에 따라 URL을 복사해 넣어주세요!");
return;
}

submitBtn.disabled = true;
submitBtn.innerHTML = '<div class="loading-spinner mx-auto"></div>';

// 데이터 전송 (이메일 도메인 합치기)
const formData = new FormData(form);
const fullEmail = document.getElementById('emailId').value + "@coupang.com";
formData.set('email', fullEmail); // 'email' 이라는 이름으로 시트에 저장됨

fetch(scriptURL, { method: 'POST', body: formData })
.then(response => {
form.classList.add('hidden');
successMsg.classList.remove('hidden');
})
.catch(error => {
alert('오류가 발생했습니다: ' + error.message);
submitBtn.disabled = false;
submitBtn.innerHTML = '<span>신청서 제출</span>';
});
});
</script>
</body>
</html>
