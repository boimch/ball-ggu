<button onclick="checkAdminPassword()" class="flex-1 py-3 bg-pink-500 text-white rounded-xl font-bold shadow-lg">확인</button>

</div>
</div>

<div class="max-w-4xl mx-auto">
<!-- 탭 메뉴 -->
<div class="flex space-x-6 md:space-x-8 mb-6 border-b border-gray-200">

<button onclick="tryAccessAdmin()" id="tab-admin" class="tab-btn pb-4 font-bold text-base md:text-lg text-gray-400 transition-all">🔐 관리자 리스트</button>

<!-- [1] 신청 폼 섹션 -->
<div id="section-form" class="bg-white rounded-3xl shadow-xl overflow-hidden">

<div>
<label class="block text-sm font-bold mb-2">이름</label>
<input type="text" id="name" required class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400" placeholder="성함을 입력하세요">
</div>
<div>
<label class="block text-sm font-bold mb-2">팀</label>
<input type="text" id="team" required class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400" placeholder="소속 팀을 입력하세요">

</div>

<div>
<label class="block text-sm font-bold mb-2">사내 이메일 주소</label>
<div class="relative flex items-center">
<input type="text" id="emailId" required
class="w-full p-3 bg-gray-50 border rounded-xl outline-pink-400 pr-32"
placeholder="이메일 아이디">
<span class="absolute right-4 text-gray-400 font-medium text-sm md:text-base">@coupang.com</span>
</div>
</div>
<div class="bg-pink-50 p-4 md:p-6 rounded-2xl border border-pink-100">
<label class="block text-sm font-bold mb-3 text-pink-800">
⚠️ 해당 프로그램은 선착순이기 때문에 신청하시면 꼭 참석해 주셔야 합니다. 이해하셨나요?
</label>
<select id="agreement" required class="w-full p-3 bg-white border border-pink-200 rounded-xl outline-pink-400 text-sm">
<option value="" disabled selected>선택해 주세요</option>
<option value="네, 이해했습니다">네, 이해했습니다</option>

</div>

<button type="submit" id="submit-btn" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl hover:bg-pink-600 shadow-lg transition-all flex justify-center items-center">
<span>신청서 제출</span>

</div>

</tr>
</thead>
<tbody id="admin-table-body">

</tbody>
</table>
</div>
<div id="no-data" class="text-center py-10 text-gray-400">신청자가 없습니다.</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

// Firebase 설정 보호 및 초기화
let db, auth;
// Canvas 외부 환경(GitHub 등)에서 실행될 때 오류를 방지하기 위해 기본값 처리
const appId = typeof __app_id !== 'undefined' ? __app_id : 'ball-ggu-session-001';

function initFirebase() {
try {
let config = {};
// Canvas 환경 변수가 있는지 확인
if (typeof __firebase_config !== 'undefined') {
config = JSON.parse(__firebase_config);
} else {
// GitHub Pages 등 외부에서 실행할 때 직접 여기에 Firebase 설정을 넣으셔도 됩니다.
// 현재는 오류 방지를 위해 빈 객체일 경우 초기화를 중단하지 않고 로딩 메시지만 띄웁니다.
console.warn("외부 환경에서 실행 중입니다. Firebase 설정이 필요합니다.");
}

if (!config.apiKey) {
console.log("Firebase API Key가 없습니다. Canvas 미리보기 모드가 아니면 설정을 수동으로 입력해야 합니다.");
// 임시 방편으로 화면 텍스트 오류만 가림
return;
}
const app = initializeApp(config);
db = getFirestore(app);
auth = getAuth(app);
setupAuth();
} catch (e) {
console.error("Firebase 초기화 에러:", e);
}
}

let userLoaded = false;
let allRegistrations = [];
let isAdminAuthenticated = false;

async function setupAuth() {
if (!auth) return;
onAuthStateChanged(auth, (user) => {
if (user && !userLoaded) {
userLoaded = true;
startListening();
}
});

try {
if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
await signInWithCustomToken(auth, __initial_auth_token);
} else {
await signInAnonymously(auth);
}
} catch (error) {
console.error("인증 에러:", error);
}
}

function startListening() {
if (!db) return;
const registrationsRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrations');
const q = query(registrationsRef);
onSnapshot(q, (snapshot) => {
allRegistrations = snapshot.docs.map(doc => ({
id: doc.id,
...doc.data()
}));
allRegistrations.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
updateUI();
}, (error) => {
console.error("데이터 수신 에러:", error);
});
}

function updateUI() {
const liveCount = document.getElementById('live-count');
const adminCount = document.getElementById('admin-count');
if (liveCount) liveCount.innerText = allRegistrations.length;
if (adminCount) adminCount.innerText = allRegistrations.length;
const submitBtn = document.getElementById('submit-btn');
if (allRegistrations.length >= 50) {
submitBtn.disabled = true;
submitBtn.innerHTML = "신청 마감됨";
submitBtn.className = "w-full bg-gray-400 text-white font-bold py-4 rounded-xl cursor-not-allowed";
} else {
submitBtn.disabled = false;
submitBtn.innerHTML = "<span>신청서 제출</span>";
submitBtn.className = "w-full bg-pink-500 text-white font-bold py-4 rounded-xl hover:bg-pink-600 shadow-lg transition-all flex justify-center items-center";
}
renderAdminTable();
}
